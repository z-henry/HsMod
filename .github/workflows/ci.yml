name: Auto Build Test

on:
  push:
    branches: [ "bepinex5" ]
  pull_request:
  merge_group:

jobs:
  build:
    runs-on: windows-latest

    steps:
    # Checkout the repository
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    # Setup .NET SDK
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.x
    
    # Restore dependencies
    - name: Restore dependencies
      run: dotnet restore --locked-mode
    
    # Build the project
    - name: Build HsMod
      run: dotnet build --configuration Release --no-restore
    
    # Set up Python
    - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
    
    # Push to Telegram
    - name: Post to Telegram
      shell: pwsh
      env:
        CHAT_ID: ${{ secrets.CHAT_ID }}
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        MESSAGE_THREAD_ID: ${{ secrets.MESSAGE_THREAD_ID }}
        COMMIT_MESSAGE: |
          New push to GitHub
          ```
          ${{ github.event.head_commit.message }}
          ```
          by `${{ github.event.head_commit.author.name }}`
          See commit detail [here](${{ github.event.head_commit.url }})
      run: |
        $escaped = & python -c "import os, json, urllib.parse; print(urllib.parse.quote(os.environ['COMMIT_MESSAGE']))"
        $url = "https://api.telegram.org/bot$env:BOT_TOKEN/sendMediaGroup?chat_id=$env:CHAT_ID&message_thread_id=$env:MESSAGE_THREAD_ID&media=%5B%7B%22type%22:%22document%22,%20%22media%22:%22attach://canary%22,%22parse_mode%22:%22MarkdownV2%22,%22caption%22:$escaped%7D%5D"
        & curl.exe -v $url -F "canary=@./HsMod/Release/HsMod.dll"